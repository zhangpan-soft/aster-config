name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: aster_config_it
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      ASTER_IT_MYSQL_URL: jdbc:mysql://localhost:3306/aster_config_it?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      ASTER_IT_MYSQL_USERNAME: root
      ASTER_IT_MYSQL_PASSWORD: 123456
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify
        run: mvn -B verify
